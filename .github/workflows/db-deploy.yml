name: Deploy Database

# Manually-triggered migration runner: applies the committed Prisma
# migrations (pnpm db:deploy → prisma migrate deploy) to the database
# named by the DATABASE_URL / DIRECT_URL repo secrets.
#
# pnpm version comes from package.json's packageManager field (9.x) —
# do not also pin it here; pnpm/action-setup@v4 errors when both are set.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: db-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Prisma migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy database migrations
        run: pnpm db:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
