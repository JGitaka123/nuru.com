name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      JWT_SECRET: ci-secret-must-be-at-least-32-chars-long
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nuru_test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm typecheck
      - run: pnpm test

  web:
    name: Web — typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_PHOTO_URL: https://photos.nuru.com
# AI evals live in .github/workflows/ai-evals.yml — a separate workflow so
# a paths filter (src/prompts/**) can gate them properly.
