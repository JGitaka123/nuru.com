name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      JWT_SECRET: ci-secret-must-be-at-least-32-chars-long
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nuru_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/nuru_test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma validate
      - run: pnpm prisma generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  integration:
    name: API integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: garapadev/postgres-postgis-pgvector:16-optimized
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      JWT_SECRET: ci-secret-must-be-at-least-32-chars-long
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nuru_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/nuru_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma validate
      - run: pnpm prisma generate
      - name: Create clean test database
        run: docker run --rm --network host -e PGPASSWORD=postgres garapadev/postgres-postgis-pgvector:16-optimized createdb -h localhost -U postgres -T template0 nuru_test
      - run: pnpm db:deploy
      - run: pnpm test:integration

  web:
    name: Web — typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_PHOTO_URL: https://photos.nuru.com
# AI evals live in .github/workflows/ai-evals.yml — a separate workflow so
# a paths filter (src/prompts/**) can gate them properly.
